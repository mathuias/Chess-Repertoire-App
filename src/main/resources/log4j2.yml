Configuration:
  name: LoggingPatternConfig
  status: trace 

  Appenders:
    Console:
      name: ConsoleAppender
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n"
  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: ConsoleAppender
    Logger:
      - name: dev.mathuias
        level: debug
        AppenderRef:
          - ref: ConsoleAppender